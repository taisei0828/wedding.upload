<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>結婚式の写真・動画を送ってください</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="hero">
    <p class="eyebrow">Wedding Photo &amp; Video Album</p>
    <h1>結婚式の写真・動画を<br>送ってください</h1>
    <p class="names">Taisei &amp; Fumika &mdash; 2026.07.11</p>
    <svg class="divider" viewBox="0 0 200 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 10 C 60 -5, 140 25, 190 10" stroke="#DCC6A0" stroke-width="1.2"/>
      <circle cx="100" cy="10" r="2.6" fill="#DCC6A0"/>
    </svg>
  </div>

  <div class="body">
    <form id="uploadForm">
      <div class="field">
        <label class="field-label" for="guestName">お名前</label>
        <input type="text" id="guestName" placeholder="例）山田 太郎" autocomplete="name" required>
      </div>

      <div class="field">
        <label class="field-label">写真・動画を選ぶ</label>
        <label class="file-drop" for="fileInput">
          <span class="icon">📷</span>
          <span class="main-txt">タップして写真・動画を追加</span>
          <span class="sub-txt">複数枚まとめて選べます（動画も可）／何回でも追加できます</span>
        </label>
        <input type="file" id="fileInput" accept="image/*,video/*" multiple>
        <div class="thumbs" id="thumbs"></div>
        <div class="count-line" id="countLine"></div>
        <p class="hint-txt">※ 一度に大量（100枚以上）に選ぶと、選択画面の表示に時間がかかる場合があります。20〜30枚ずつ選ぶとスムーズです。また、動画が多い場合は会場のWi-Fiに接続すると送信が速くなります。</p>
      </div>

      <button type="submit" class="submit" id="submitBtn" disabled>送信する</button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel"></div>
        <button type="button" class="cancel-btn" id="cancelBtn">アップロードを中断する</button>
      </div>

      <div class="message" id="messageBox"></div>
      <button type="button" class="again-btn" id="againBtn" style="display:none;">続けて別の写真を送る</button>
    </form>

    <p class="footer-note">送信された写真・動画は新郎新婦のクラウドストレージに安全に保存されます</p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
