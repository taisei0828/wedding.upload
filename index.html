<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>結婚式の写真を送ってください</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#26312B;
    --paper:#F3F6F1;
    --paper-deep:#E9EFE6;
    --forest:#1F3A2E;
    --gold:#B8935A;
    --gold-soft:#DCC6A0;
    --blush:#D9A7A0;
    --error:#B4453F;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 10% 8%, rgba(184,147,90,0.10), transparent 40%),
      radial-gradient(circle at 90% 92%, rgba(217,167,160,0.14), transparent 45%);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px 64px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%;
    max-width:480px;
    background:#fff;
    border-radius:var(--radius);
    box-shadow:0 20px 60px -20px rgba(31,58,46,0.25);
    overflow:hidden;
    border:1px solid var(--paper-deep);
  }
  .hero{
    background:var(--forest);
    color:var(--paper);
    padding:36px 28px 28px;
    text-align:center;
    position:relative;
  }
  .hero .eyebrow{
    font-size:11px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--gold-soft);
    margin:0 0 10px;
  }
  .hero h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:30px;
    line-height:1.3;
    margin:0;
  }
  .hero .names{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:19px;
    color:var(--gold-soft);
    margin-top:10px;
  }
  .divider{
    width:100%;
    height:22px;
    margin-top:18px;
  }
  .body{
    padding:28px 26px 30px;
  }
  label.field-label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--forest);
    margin-bottom:8px;
    letter-spacing:0.01em;
  }
  input[type="text"]{
    width:100%;
    padding:14px 16px;
    border-radius:12px;
    border:1.5px solid var(--paper-deep);
    background:var(--paper);
    font-family:'Work Sans', sans-serif;
    font-size:16px;
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease;
  }
  input[type="text"]:focus{
    border-color:var(--gold);
  }
  .field{
    margin-bottom:22px;
  }
  .file-drop{
    border:1.5px dashed var(--gold-soft);
    border-radius:14px;
    background:var(--paper);
    padding:26px 16px;
    text-align:center;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .file-drop:active{
    background:var(--paper-deep);
  }
  .file-drop .icon{
    font-size:26px;
    display:block;
    margin-bottom:8px;
  }
  .file-drop .main-txt{
    font-size:15px;
    font-weight:500;
    color:var(--forest);
  }
  .file-drop .sub-txt{
    font-size:12.5px;
    color:#7A8A80;
    margin-top:4px;
  }
  input[type="file"]{ display:none; }
  .thumbs{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:8px;
    margin-top:14px;
  }
  .thumb{
    position:relative;
    aspect-ratio:1/1;
    border-radius:8px;
    overflow:hidden;
    background:var(--paper-deep);
  }
  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .thumb .status{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    background:rgba(31,58,46,0.55);
    color:#fff;
    opacity:0;
    transition:opacity .2s ease;
  }
  .thumb.done .status, .thumb.uploading .status, .thumb.error .status{ opacity:1; }
  .thumb.video-tile{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--forest);
    color:var(--paper);
    font-size:20px;
  }
  .thumb .size-tag{
    position:absolute;
    bottom:3px;
    left:4px;
    font-size:9px;
    background:rgba(0,0,0,0.45);
    color:#fff;
    padding:1px 4px;
    border-radius:4px;
  }
  .count-line{
    margin-top:10px;
    font-size:12.5px;
    color:#7A8A80;
    text-align:right;
  }
  button.submit{
    width:100%;
    margin-top:24px;
    padding:16px;
    border:none;
    border-radius:999px;
    background:var(--forest);
    color:var(--paper);
    font-family:'Work Sans', sans-serif;
    font-size:16px;
    font-weight:600;
    letter-spacing:0.02em;
    cursor:pointer;
    transition:transform .12s ease, background .15s ease;
  }
  button.submit:active{ transform:scale(0.98); }
  button.submit:disabled{
    background:#A9B7AE;
    cursor:not-allowed;
  }
  .progress-wrap{
    margin-top:16px;
    display:none;
  }
  .progress-wrap.show{ display:block; }
  .progress-track{
    width:100%;
    height:6px;
    border-radius:999px;
    background:var(--paper-deep);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--gold), var(--forest));
    transition:width .25s ease;
  }
  .progress-label{
    margin-top:8px;
    font-size:13px;
    color:var(--forest);
    text-align:center;
  }
  .message{
    margin-top:18px;
    padding:14px 16px;
    border-radius:12px;
    font-size:13.5px;
    line-height:1.5;
    display:none;
  }
  .message.show{ display:block; }
  .message.success{
    background:#EAF1E7;
    color:var(--forest);
    border:1px solid #CFE0C8;
  }
  .message.error{
    background:#FBEAE9;
    color:var(--error);
    border:1px solid #F3CFCD;
  }
  .again-btn{
    margin-top:12px;
    background:none;
    border:1.5px solid var(--gold);
    color:var(--forest);
    padding:10px 18px;
    border-radius:999px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
  }
  .footer-note{
    text-align:center;
    font-size:11.5px;
    color:#9AA79E;
    margin-top:22px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="hero">
    <p class="eyebrow">Wedding Photo &amp; Video Album</p>
    <h1>結婚式の写真・動画を<br>送ってください</h1>
    <p class="names">Taro &amp; Hanako &mdash; 2026.09.20</p>
    <svg class="divider" viewBox="0 0 200 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 10 C 60 -5, 140 25, 190 10" stroke="#DCC6A0" stroke-width="1.2"/>
      <circle cx="100" cy="10" r="2.6" fill="#DCC6A0"/>
    </svg>
  </div>

  <div class="body">
    <form id="uploadForm">
      <div class="field">
        <label class="field-label" for="guestName">お名前</label>
        <input type="text" id="guestName" placeholder="例）山田 太郎" autocomplete="name" required>
      </div>

      <div class="field">
        <label class="field-label">写真・動画を選ぶ</label>
        <label class="file-drop" for="fileInput">
          <span class="icon">📷</span>
          <span class="main-txt">タップして写真・動画を選択</span>
          <span class="sub-txt">複数枚まとめて選べます（動画も可）</span>
        </label>
        <input type="file" id="fileInput" accept="image/*,video/*" multiple>
        <div class="thumbs" id="thumbs"></div>
        <div class="count-line" id="countLine"></div>
      </div>

      <button type="submit" class="submit" id="submitBtn" disabled>送信する</button>

      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-label" id="progressLabel"></div>
      </div>

      <div class="message" id="messageBox"></div>
      <button type="button" class="again-btn" id="againBtn" style="display:none;">続けて別の写真を送る</button>
    </form>

    <p class="footer-note">送信された写真・動画は新郎新婦のGoogleドライブに保存されます</p>
  </div>
</div>

<script>
  // ▼▼▼ ここに、Google Apps Scriptをデプロイして得られる「ウェブアプリURL」を貼り付けてください ▼▼▼
  const SCRIPT_URL = "https://script.google.com/macros/s/XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX/exec";
  // ▲▲▲ setup_guide.md の手順3を参照 ▲▲▲

  const CHUNK_SIZE = 6 * 1024 * 1024;      // 1チャンクあたり6MB（Base64化しても余裕を持ってApps Scriptの上限内に収まるサイズ）
  const MAX_FILE_SIZE = 500 * 1024 * 1024; // 1ファイルあたりの上限（500MB）。大きすぎる動画をはじくための安全弁
  const MAX_RETRIES = 4;                   // 混雑時の自動リトライ回数

  const form = document.getElementById('uploadForm');
  const fileInput = document.getElementById('fileInput');
  const thumbsEl = document.getElementById('thumbs');
  const countLine = document.getElementById('countLine');
  const submitBtn = document.getElementById('submitBtn');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressLabel = document.getElementById('progressLabel');
  const messageBox = document.getElementById('messageBox');
  const againBtn = document.getElementById('againBtn');
  const guestNameInput = document.getElementById('guestName');

  let selectedFiles = [];

  fileInput.addEventListener('change', () => {
    const chosen = Array.from(fileInput.files);
    const tooBig = chosen.filter(f => f.size > MAX_FILE_SIZE);
    selectedFiles = chosen.filter(f => f.size <= MAX_FILE_SIZE);
    renderThumbs();
    updateSubmitState();
    if (tooBig.length > 0) {
      showMessage('error', `${tooBig.length}件のファイルは1件あたりの上限（500MB）を超えているため、選択から除外しました。`);
    } else {
      messageBox.classList.remove('show');
    }
  });

  guestNameInput.addEventListener('input', updateSubmitState);

  function updateSubmitState(){
    submitBtn.disabled = !(guestNameInput.value.trim().length > 0 && selectedFiles.length > 0);
  }

  function formatSize(bytes){
    if(bytes < 1024*1024) return Math.round(bytes/1024) + 'KB';
    return (bytes/(1024*1024)).toFixed(1) + 'MB';
  }

  function renderThumbs(){
    thumbsEl.innerHTML = '';
    selectedFiles.forEach((file, idx) => {
      const div = document.createElement('div');
      const isVideo = file.type.startsWith('video/');
      div.className = 'thumb' + (isVideo ? ' video-tile' : '');
      div.dataset.idx = idx;

      if(isVideo){
        div.textContent = '🎥';
      }else{
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        div.appendChild(img);
      }

      const sizeTag = document.createElement('div');
      sizeTag.className = 'size-tag';
      sizeTag.textContent = formatSize(file.size);
      div.appendChild(sizeTag);

      const status = document.createElement('div');
      status.className = 'status';
      div.appendChild(status);

      thumbsEl.appendChild(div);
    });
    countLine.textContent = selectedFiles.length > 0 ? `${selectedFiles.length}件選択中` : '';
  }

  function blobToBase64(blob){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  function makeUploadId(){
    return 'u' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
  }

  function sleep(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  async function sendChunkWithRetry(payload){
    let lastErr;
    for(let attempt = 0; attempt <= MAX_RETRIES; attempt++){
      try{
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Apps Scriptのプリフライト回避のためtext/plainで送る
          body: JSON.stringify(payload)
        });
        const json = await res.json();
        if(json.status !== 'success'){
          throw new Error(json.message || 'アップロードに失敗しました');
        }
        return; // 成功
      }catch(err){
        lastErr = err;
        // 混雑（同時実行過多）などによる一時的な失敗を想定し、間隔をあけて再試行
        const waitMs = 800 * Math.pow(2, attempt) + Math.random() * 400;
        await sleep(waitMs);
      }
    }
    throw lastErr;
  }

  // ファイルをチャンクに分割し、順番に送信する。onChunkProgress(chunkIndex, totalChunks) で進捗通知。
  async function uploadOne(file, guestName, onChunkProgress){
    const uploadId = makeUploadId();
    const totalChunks = Math.max(1, Math.ceil(file.size / CHUNK_SIZE));

    for(let i = 0; i < totalChunks; i++){
      const start = i * CHUNK_SIZE;
      const end = Math.min(file.size, start + CHUNK_SIZE);
      const chunkBlob = file.slice(start, end);
      const base64 = await blobToBase64(chunkBlob);

      const payload = {
        uploadId: uploadId,
        guestName: guestName,
        fileName: file.name,
        mimeType: file.type || 'application/octet-stream',
        chunkIndex: i,
        totalChunks: totalChunks,
        isLastChunk: (i === totalChunks - 1),
        data: base64
      };

      await sendChunkWithRetry(payload);
      if(onChunkProgress) onChunkProgress(i + 1, totalChunks);
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if(SCRIPT_URL.includes('XXXXXXXX')){
      showMessage('error', 'まだGoogle Apps ScriptのURLが設定されていません。index.html内のSCRIPT_URLを設定してください。');
      return;
    }

    submitBtn.disabled = true;
    guestNameInput.disabled = true;
    fileInput.disabled = true;
    progressWrap.classList.add('show');
    messageBox.classList.remove('show');

    const guestName = guestNameInput.value.trim();
    const total = selectedFiles.length;
    let done = 0;
    let failed = [];

    for(let i = 0; i < total; i++){
      const thumbEl = thumbsEl.querySelector(`.thumb[data-idx="${i}"] .status`);
      if(thumbEl){ thumbEl.parentElement.classList.add('uploading'); thumbEl.textContent = '…'; }
      try{
        await uploadOne(selectedFiles[i], guestName, (chunkDone, chunkTotal) => {
          if(chunkTotal > 1){
            progressLabel.textContent = `送信中… (${i+1}/${total}件目 / データ ${chunkDone}/${chunkTotal})`;
          }
        });
        done++;
        if(thumbEl){
          thumbEl.parentElement.classList.remove('uploading');
          thumbEl.parentElement.classList.add('done');
          thumbEl.textContent = '✓';
        }
      }catch(err){
        failed.push(selectedFiles[i].name);
        if(thumbEl){
          thumbEl.parentElement.classList.remove('uploading');
          thumbEl.parentElement.classList.add('error');
          thumbEl.textContent = '×';
        }
      }
      const pct = Math.round(((i+1)/total)*100);
      progressFill.style.width = pct + '%';
      progressLabel.textContent = `送信中… (${i+1}/${total}枚)`;
    }

    progressWrap.classList.remove('show');

    if(failed.length === 0){
      showMessage('success', `${done}件の写真・動画を送信しました。ありがとうございます！`);
    }else{
      showMessage('error', `${done}件は送信できましたが、${failed.length}件の送信に失敗しました（通信環境をご確認の上、もう一度お試しください）。`);
    }

    againBtn.style.display = 'inline-block';
  });

  againBtn.addEventListener('click', () => {
    selectedFiles = [];
    fileInput.value = '';
    guestNameInput.value = '';
    guestNameInput.disabled = false;
    fileInput.disabled = false;
    thumbsEl.innerHTML = '';
    countLine.textContent = '';
    messageBox.classList.remove('show');
    againBtn.style.display = 'none';
    updateSubmitState();
  });

  function showMessage(type, text){
    messageBox.className = 'message show ' + type;
    messageBox.textContent = text;
  }
</script>

</body>
</html>
